# Frontend CD: Lungo frontend – ESLint & Prettier.
# Runs on: push to any branch, and pull_request targeting main (when lungo frontend paths change).
name: FE CD

on:
  push:
    paths:
      - "coffeeAGNTCY/coffee_agents/lungo/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "coffeeAGNTCY/coffee_agents/lungo/frontend/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coffeeAGNTCY/coffee_agents/lungo/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: coffeeAGNTCY/coffee_agents/lungo/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint:check

      - name: Prettier
        run: npm run format:check
