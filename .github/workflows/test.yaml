# LLM integration tests are mandatory for merge (branch protection). Same-repo PRs run on
# every push; fork PRs use integration-fork-approve.yaml after @agntcy/coffee-agntcy-reviewers Approve.
name: Integration Tests
on:
  push:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/workflows/ci-smoke.yaml'
      - '.github/workflows/test-smoke-reusable.yaml'
      - '.github/workflows/integration-fork-approve.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  pull_request:
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/workflows/ci-smoke.yaml'
      - '.github/workflows/test-smoke-reusable.yaml'
      - '.github/workflows/integration-fork-approve.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  workflow_call:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true

jobs:
  subprojects-to-test:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/test-subprojects-reusable.yaml
    with:
      test_corto: ${{ github.event_name == 'workflow_call' && inputs.test_corto || github.event_name == 'workflow_dispatch' && inputs.test_corto || github.event_name != 'workflow_call' && github.event_name != 'workflow_dispatch' }}
      test_lungo: ${{ github.event_name == 'workflow_call' && inputs.test_lungo || github.event_name == 'workflow_dispatch' && inputs.test_lungo || github.event_name != 'workflow_call' && github.event_name != 'workflow_dispatch' }}
      test_recruiter: ${{ github.event_name == 'workflow_call' && inputs.test_recruiter || github.event_name == 'workflow_dispatch' && inputs.test_recruiter || github.event_name != 'workflow_call' && github.event_name != 'workflow_dispatch' }}

  integration-tests-corto:
    name: integration / corto
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_corto == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/corto
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
    secrets: inherit

  integration-corto-path-skip:
    name: integration / corto
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_corto != 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: No corto path changes
        run: echo "integration / corto satisfied without running tests (no corto path changes)."

  integration-tests-lungo:
    name: integration / lungo
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_lungo == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/lungo
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
    secrets: inherit

  integration-lungo-path-skip:
    name: integration / lungo
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_lungo != 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: No lungo path changes
        run: echo "integration / lungo satisfied without running tests (no lungo path changes)."

  integration-tests-recruiter:
    name: integration / recruiter
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_recruiter == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/recruiter
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
    secrets: inherit

  integration-recruiter-path-skip:
    name: integration / recruiter
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_recruiter != 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: No recruiter path changes
        run: echo "integration / recruiter satisfied without running tests (no recruiter path changes)."
