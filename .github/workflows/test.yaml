name: Python Tests

on:
  push:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '!coffeeAGNTCY/coffee_agents/*/docs/**'
      - '!coffeeAGNTCY/coffee_agents/corto/exchange/frontend/**'
      - '!coffeeAGNTCY/coffee_agents/lungo/frontend/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  pull_request:
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '!coffeeAGNTCY/coffee_agents/*/docs/**'
      - '!coffeeAGNTCY/coffee_agents/corto/exchange/frontend/**'
      - '!coffeeAGNTCY/coffee_agents/lungo/frontend/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  workflow_call:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_mode:
        description: 'Which tiers to run: all | fast | integration | llm-only'
        required: false
        type: string
        default: "all"
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_mode:
        description: 'Which tiers to run: all | fast | integration | llm-only'
        required: false
        type: string
        default: "all"
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true

jobs:
  subprojects-to-test:
    uses: ./.github/workflows/test-subprojects-reusable.yaml
    with:
      test_corto: ${{ inputs.test_corto }}
      test_lungo: ${{ inputs.test_lungo }}
      test_recruiter: ${{ inputs.test_recruiter }}

  fast-corto:
    name: fast / corto
    needs: subprojects-to-test
    concurrency:
      group: python-tests-fast-corto-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: |
      needs.subprojects-to-test.outputs.test_corto == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/corto
      test_mode: fast
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  fast-corto-path-skip:
    name: fast / corto
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_corto != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    runs-on: ubuntu-latest
    steps:
      - name: No corto path changes
        run: echo "fast / corto satisfied without running tests (no corto path changes)."

  integration-corto:
    name: integration / corto
    needs: subprojects-to-test
    concurrency:
      group: python-tests-integration-corto-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    if: |
      needs.subprojects-to-test.outputs.test_corto == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/corto
      test_mode: ${{ inputs.test_mode == 'llm-only' && 'llm-only' || 'integration' }}
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  integration-corto-path-skip:
    name: integration / corto
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_corto != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only')
    runs-on: ubuntu-latest
    steps:
      - name: No corto path changes
        run: echo "integration / corto satisfied without running tests (no corto path changes)."

  fast-lungo:
    name: fast / lungo
    needs: subprojects-to-test
    concurrency:
      group: python-tests-fast-lungo-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: |
      needs.subprojects-to-test.outputs.test_lungo == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/lungo
      test_mode: fast
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  fast-lungo-path-skip:
    name: fast / lungo
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_lungo != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    runs-on: ubuntu-latest
    steps:
      - name: No lungo path changes
        run: echo "fast / lungo satisfied without running tests (no lungo path changes)."

  integration-lungo:
