name: Integration Tests
on:
  push:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  pull_request:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
  workflow_call:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo

jobs:
  subprojects-to-test:
    runs-on: ubuntu-latest
    outputs:
      test_corto: ${{ steps.check-subprojects.outputs.test_corto }}
      test_lungo: ${{ steps.check-subprojects.outputs.test_lungo }}
    defaults:
      run:
        shell: bash
    env:
      WORKFLOW_FILES_LIST_JSON: '[".github/workflows/test.yaml", ".github/workflows/test-reusable.yaml"]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log event info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"

      - name: Log call or dispatch inputs
        if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
        run: |
          echo "pip_overrides=${{ inputs.pip_overrides }}"
          echo "pip_constraints=${{ inputs.pip_constraints }}"
          echo "docker_overrides=${{ inputs.docker_overrides }}"
          echo "test_corto=${{ inputs.test_corto }}"
          echo "test_lungo=${{ inputs.test_lungo }}"

      - name: Detect changed paths for main sub-projects
        id: check-subprojects
        run: |
          test_corto=false
          test_lungo=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            test_corto=true
            test_lungo=true
          elif [[ "${{ github.event_name }}" == "workflow_call" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            test_corto=${{ inputs.test_corto }}
            test_lungo=${{ inputs.test_lungo }}
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            # Returns 0 if there are changes, 1 if no changes
            paths_have_changes() (
              local base=$1 head=$2 paths_json_list=$3

              # 1. Initialize an empty array
              paths=()

              # 2. Fill the array using a while loop
              # We use IFS= to prevent trimming whitespace and -r to handle backslashes
              while IFS= read -r line; do
                paths+=("$line")
              done < <(echo "$paths_json_list" | jq -r '.[]')

              # This option only lives in the subshell of this function because the function is defined with () instead of {}.
              set -x 

              # 3. Use the array in the git diff command to detect changes
              ! git diff --name-only --exit-code --ignore-blank-lines $base $head -- "${paths[@]}"
            )

            paths_json_corto=$(echo $WORKFLOW_FILES_LIST_JSON | jq -c -r --arg new_val "$CORTO_DIR" '[$new_val] + .')
            paths_have_changes $base $head $paths_json_corto && test_corto=true

            paths_json_lungo=$(echo $WORKFLOW_FILES_LIST_JSON | jq -c -r --arg new_val "$LUNGO_DIR" '[$new_val] + .')
            paths_have_changes $base $head $paths_json_lungo && test_lungo=true
          fi

          echo "test_corto=$test_corto" | tee -a $GITHUB_OUTPUT
          echo "test_lungo=$test_lungo" | tee -a $GITHUB_OUTPUT

  integration-tests-corto:
    needs: subprojects-to-test
    if: ${{ needs.subprojects-to-test.outputs.test_corto == 'true' }}
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/corto # cannot access env context here
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
    secrets: inherit

  integration-tests-lungo:
    needs: subprojects-to-test
    if: ${{ needs.subprojects-to-test.outputs.test_lungo == 'true' }}
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/lungo # cannot access env context here
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
    secrets: inherit
