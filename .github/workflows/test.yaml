      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/lungo
      test_mode: ${{ inputs.test_mode == 'llm-only' && 'llm-only' || 'integration' }}
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  integration-lungo-path-skip:
    name: integration / lungo
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_lungo != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only')
    runs-on: ubuntu-latest
    steps:
      - name: No lungo path changes
        run: echo "integration / lungo satisfied without running tests (no lungo path changes)."

  fast-recruiter:
    name: fast / recruiter
    needs: subprojects-to-test
    concurrency:
      group: python-tests-fast-recruiter-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: |
      needs.subprojects-to-test.outputs.test_recruiter == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/recruiter
      test_mode: fast
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  fast-recruiter-path-skip:
    name: fast / recruiter
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_recruiter != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'fast')
    runs-on: ubuntu-latest
    steps:
      - name: No recruiter path changes
        run: echo "fast / recruiter satisfied without running tests (no recruiter path changes)."

  integration-recruiter:
    name: integration / recruiter
    needs: subprojects-to-test
    concurrency:
      group: python-tests-integration-recruiter-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    if: |
      needs.subprojects-to-test.outputs.test_recruiter == 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request' ||
      inputs.test_mode == 'all' || inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only')
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/recruiter
      test_mode: ${{ inputs.test_mode == 'llm-only' && 'llm-only' || 'integration' }}
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}
      fork_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit

  integration-recruiter-path-skip:
