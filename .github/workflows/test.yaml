name: Python Tests

on:
  push:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '!coffeeAGNTCY/coffee_agents/*/docs/**'
      - '!coffeeAGNTCY/coffee_agents/corto/exchange/frontend/**'
      - '!coffeeAGNTCY/coffee_agents/lungo/frontend/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  pull_request:
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - 'coffeeAGNTCY/coffee_agents/recruiter/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '!coffeeAGNTCY/coffee_agents/*/docs/**'
      - '!coffeeAGNTCY/coffee_agents/corto/exchange/frontend/**'
      - '!coffeeAGNTCY/coffee_agents/lungo/frontend/**'
      - '.github/workflows/test.yaml'
      - '.github/workflows/test-reusable.yaml'
      - '.github/workflows/test-subprojects-reusable.yaml'
      - '.github/actions/check-paths-have-changes/**'
      - '.dockerignore'
  workflow_call:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      test_corto:
        description: 'Whether to test the Corto project.'
        required: false
        type: boolean
        default: true
      test_lungo:
        description: 'Whether to test the Lungo project.'
        required: false
        type: boolean
        default: true
      test_recruiter:
        description: 'Whether to test the Recruiter project.'
        required: false
        type: boolean
        default: true

jobs:
  subprojects-to-test:
    uses: ./.github/workflows/test-subprojects-reusable.yaml
    with:
      test_corto: ${{ inputs.test_corto }}
      test_lungo: ${{ inputs.test_lungo }}
      test_recruiter: ${{ inputs.test_recruiter }}

  tests-corto:
    name: tests / corto
    needs: subprojects-to-test
    concurrency:
      group: python-tests-corto-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: needs.subprojects-to-test.outputs.test_corto == 'true'
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/corto
      test_paths: tests/unit tests/integration
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}

  tests-corto-path-skip:
    name: tests / corto
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_corto != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: No corto path changes
        run: echo "tests / corto satisfied without running tests (no corto path changes)."

  tests-lungo:
    name: tests / lungo
    needs: subprojects-to-test
    concurrency:
      group: python-tests-lungo-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: needs.subprojects-to-test.outputs.test_lungo == 'true'
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/lungo
      test_paths: tests/unit tests/live tests/integration
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}

  tests-lungo-path-skip:
    name: tests / lungo
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_lungo != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: No lungo path changes
        run: echo "tests / lungo satisfied without running tests (no lungo path changes)."

  tests-recruiter:
    name: tests / recruiter
    needs: subprojects-to-test
    concurrency:
      group: python-tests-recruiter-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: needs.subprojects-to-test.outputs.test_recruiter == 'true'
    uses: ./.github/workflows/test-reusable.yaml
    with:
      project_dir: coffeeAGNTCY/coffee_agents/recruiter
      test_paths: tests/unit tests/integration
      pip_overrides: ${{ inputs.pip_overrides }}
      pip_constraints: ${{ inputs.pip_constraints }}
      docker_overrides: ${{ inputs.docker_overrides }}

  tests-recruiter-path-skip:
    name: tests / recruiter
    needs: subprojects-to-test
    if: |
      needs.subprojects-to-test.outputs.test_recruiter != 'true' &&
      (github.event_name == 'push' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: No recruiter path changes
        run: echo "tests / recruiter satisfied without running tests (no recruiter path changes)."
