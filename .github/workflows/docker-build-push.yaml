name: Build and Push Project Docker Images

on:
  push:
    tags: ["*"]
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  pull_request:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  workflow_dispatch:

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo
  RECRUITER_DIR: coffeeAGNTCY/coffee_agents/recruiter

jobs:
  subprojects-to-build:
    runs-on: ubuntu-latest
    outputs:
      build_corto: ${{ steps.check-subprojects.outputs.build_corto }}
      build_lungo: ${{ steps.check-subprojects.outputs.build_lungo }}
      build_recruiter: ${{ steps.check-subprojects.outputs.build_recruiter }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Detect changed paths for main sub-projects
        id: check-subprojects
        run: |
          build_corto=false
          build_lungo=false
          build_recruiter=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            build_corto=true
            build_lungo=true
            build_recruiter=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            # Returns 0 if dir has changes, 1 if no changes
            dir_has_changes() (
              local base=$1 head=$2 dir=$3
              set -x # This option only lives in the subshell of this function because the function is defined with () instead of {}.
              ! git diff --name-only --exit-code --ignore-blank-lines $base $head "$dir"
            )
            dir_has_changes $base $head "$CORTO_DIR" && build_corto=true || build_corto=false
            dir_has_changes $base $head "$LUNGO_DIR" && build_lungo=true || build_lungo=false
            dir_has_changes $base $head "$RECRUITER_DIR" && build_recruiter=true || build_recruiter=false
          fi

          echo "build_corto=$build_corto" | tee -a $GITHUB_OUTPUT
          echo "build_lungo=$build_lungo" | tee -a $GITHUB_OUTPUT
          echo "build_recruiter=$build_recruiter" | tee -a $GITHUB_OUTPUT

  compute-build-parameters:
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.build_params.outputs.push}}
      image_tag: ${{ steps.build_params.outputs.image_tag }}
      git_branch: ${{ steps.build_params.outputs.git_branch }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Compute build parameters
        id: build_params
        run: |
          # default values
          push=false
          image_tag=unknown
          git_branch=${{ github.ref_name }}

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            image_tag=pr-${{ github.event.pull_request.number }}
            git_branch=${{ github.head_ref }}
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            push=true
            image_tag=latest
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            push=true
            image_tag=${{ steps.get_tag.outputs.tag_name }}
          fi

          echo "push=$push" | tee -a $GITHUB_OUTPUT
          echo "image_tag=$image_tag" | tee -a $GITHUB_OUTPUT
          echo "git_branch=$git_branch" | tee -a $GITHUB_OUTPUT

  docker-build-corto:
    needs: [subprojects-to-build, compute-build-parameters]
    if: ${{ needs.subprojects-to-build.outputs.build_corto == 'true' }}

    strategy:
      matrix:
        image:
        - name: corto-ui
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.ui
        - name: corto-exchange
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.exchange
        - name: corto-farm
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.farm

    permissions: # permissions can only be maintained or reduced (not elevated) throughout a chain of workflows
      packages: write
      contents: read

    uses: ./.github/workflows/docker-build-reusable.yaml
    with:
      name: ${{ matrix.image.name }}
      dockerfile: ${{ matrix.image.dockerfile }}
      push: ${{ needs.compute-build-parameters.outputs.push == 'true' }}
      platforms: linux/amd64,linux/arm64
      image_tag: ${{ needs.compute-build-parameters.outputs.image_tag }}
      git_branch: ${{ needs.compute-build-parameters.outputs.git_branch }}

  docker-build-lungo:
    needs: [subprojects-to-build, compute-build-parameters]
    if: ${{ needs.subprojects-to-build.outputs.build_lungo == 'true' }}

    strategy:
      matrix:
        image:
        - name: lungo-ui
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.ui
        - name: auction-supervisor
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.auction-supervisor
        - name: brazil-farm
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.brazil-farm
        - name: colombia-farm
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.colombia-farm
        - name: vietnam-farm
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.vietnam-farm
        - name: weather-mcp-server
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.weather-mcp
        - name: payment-mcp-server
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.payment-mcp
        - name: logistics-shipper
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.logistics-shipper
        - name: logistics-accountant
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.logistics-accountant
        - name: logistics-farm
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.logistics-farm
        - name: logistics-supervisor
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.logistics-supervisor
        - name: logistics-helpdesk
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.logistics-helpdesk
        - name: recruiter-supervisor
          dockerfile: coffeeAGNTCY/coffee_agents/lungo/docker/Dockerfile.recruiter-supervisor

    permissions: # permissions can only be maintained or reduced (not elevated) throughout a chain of workflows
      packages: write
      contents: read
      
    uses: ./.github/workflows/docker-build-reusable.yaml
    with:
      name: ${{ matrix.image.name }}
      dockerfile: ${{ matrix.image.dockerfile }}
      push: ${{ needs.compute-build-parameters.outputs.push == 'true' }}
      platforms: linux/amd64,linux/arm64
      image_tag: ${{ needs.compute-build-parameters.outputs.image_tag }}
      git_branch: ${{ needs.compute-build-parameters.outputs.git_branch }}

  docker-build-recruiter:
    needs: [subprojects-to-build, compute-build-parameters]
    if: ${{ needs.subprojects-to-build.outputs.build_recruiter == 'true' }}

    strategy:
      matrix:
        image:
          - name: recruiter
            dockerfile: coffeeAGNTCY/coffee_agents/recruiter/Dockerfile

    permissions: # permissions can only be maintained or reduced (not elevated) throughout a chain of workflows
      packages: write
      contents: read

    uses: ./.github/workflows/docker-build-reusable.yaml
    with:
      name: ${{ matrix.image.name }}
      dockerfile: ${{ matrix.image.dockerfile }}
      push: ${{ needs.compute-build-parameters.outputs.push == 'true' }}
      platforms: linux/amd64,linux/arm64
      image_tag: ${{ needs.compute-build-parameters.outputs.image_tag }}
      git_branch: ${{ needs.compute-build-parameters.outputs.git_branch }}
