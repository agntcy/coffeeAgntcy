            git.commit.short=${{ steps.metadata.outputs.short_sha }}

  docker-build-recruiter:
    needs: subprojects-to-build
    if: ${{ needs.subprojects-to-build.outputs.build_recruiter == 'true' }}
    runs-on: ubuntu-latest
    strategy:
