name: Build and Push All Docker Images

on:
  push:
    tags: ["*"]
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  pull_request:
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  workflow_dispatch:

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo
  RECRUITER_DIR: coffeeAGNTCY/coffee_agents/recruiter

jobs:
  subprojects-to-build:
    runs-on: ubuntu-latest
    outputs:
      build_corto: ${{ steps.check-subprojects.outputs.build_corto }}
      build_lungo: ${{ steps.check-subprojects.outputs.build_lungo }}
      build_recruiter: ${{ steps.check-subprojects.outputs.build_recruiter }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Detect changed paths for main sub-projects
        id: check-subprojects
        run: |
          build_corto=false
          build_lungo=false
          build_recruiter=false

          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == refs/tags/* || "${{ github.ref }}" == refs/heads/main ) ]]; then
            build_corto=true
            build_lungo=true
            build_recruiter=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "Commits to compare: base=$base head=$head"

            # git diff --quiet implies --exit-code (0 means no changes (no need to build), 1 means changes were found (need to build))
            build_corto=$(git diff --quiet --ignore-blank-lines $base $head "$CORTO_DIR" 2>/dev/null && echo false || echo true)
            build_lungo=$(git diff --quiet --ignore-blank-lines $base $head "$LUNGO_DIR" 2>/dev/null && echo false || echo true)
            build_recruiter=$(git diff --quiet --ignore-blank-lines $base $head "$RECRUITER_DIR" 2>/dev/null && echo false || echo true)
          fi

          # Debug resulting build flags
          echo "Container images to build for subprojects: corto=$build_corto lungo=$build_lungo recruiter=$build_recruiter"

          # Output build flags for subsequent use
          echo "build_corto=$build_corto" >> $GITHUB_OUTPUT
          echo "build_lungo=$build_lungo" >> $GITHUB_OUTPUT
          echo "build_recruiter=$build_recruiter" >> $GITHUB_OUTPUT

  docker-build-corto:
    needs: subprojects-to-build
    if: ${{ needs.subprojects-to-build.outputs.build_corto == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
        - name: corto-ui
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.ui
        - name: corto-exchange
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.exchange
        - name: corto-farm
          dockerfile: coffeeAGNTCY/coffee_agents/corto/docker/Dockerfile.farm

    permissions:
      packages: write
      contents: read

    steps:
      - name: Pre-cleanup Docker images
        run: docker system prune -af

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Git tag (if any)
        id: get_tag
        run: |
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate metadata
        id: metadata
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "date_formatted=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Log Event Type
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Tag: ${{ steps.get_tag.outputs.tag_name }}"

      - name: Set build parameters
        id: build_params
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            push_container=true
            platforms=linux/amd64,linux/arm64
            image_tag=${{ steps.get_tag.outputs.tag_name }}
            git_branch=${{ github.ref_name }}
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            push_container=true
            platforms=linux/amd64,linux/arm64
            image_tag=latest
            git_branch=${{ github.ref_name }}
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            push_container=false
            platforms=linux/amd64
            image_tag=pr-${{ github.event.pull_request.number }}
            git_branch=${{ github.head_ref }}
          else
            push_container=false
            platforms=linux/amd64
            image_tag=unknown
            git_branch=${{ github.ref_name }}
          fi

          # Debug resulting parameters
          echo "push_container=$push_container"
          echo "platforms=$platforms"
          echo "image_tag=$image_tag"
          echo "git_branch=$git_branch"
          
          # Output parameters for use in subsequent steps
          echo "push_container=$push_container" >> $GITHUB_OUTPUT
          echo "platforms=$platforms" >> $GITHUB_OUTPUT
          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT
          echo "git_branch=$git_branch" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: steps.build_params.outputs.push_container == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and conditional push Docker image
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: ${{ steps.build_params.outputs.push_container }}
          platforms: ${{ steps.build_params.outputs.platforms }}
          tags: ghcr.io/${{ github.repository_owner }}/coffee-agntcy/${{ matrix.image.name }}:${{ steps.build_params.outputs.image_tag }}
          build-args: |
            BUILD_VERSION=${{ steps.build_params.outputs.image_tag }}
            BUILD_DATE=${{ steps.metadata.outputs.date_formatted }}
            BUILD_TIMESTAMP=${{ steps.metadata.outputs.date }}
            GIT_COMMIT=${{ github.sha }}
            GIT_COMMIT_SHORT=${{ steps.metadata.outputs.short_sha }}
            GIT_BRANCH=${{ steps.build_params.outputs.git_branch }}
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_WORKFLOW=${{ github.workflow }}
            BUILD_ACTOR=${{ github.actor }}
            BUILD_SOURCE=ci
            IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/coffee-agntcy/${{ matrix.image.name }}
            IMAGE_TAG=${{ steps.build_params.outputs.image_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.build_params.outputs.image_tag }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            build.number=${{ github.run_number }}
            build.workflow=${{ github.workflow }}
            build.actor=${{ github.actor }}
            git.branch=${{ steps.build_params.outputs.git_branch }}
            git.commit.short=${{ steps.metadata.outputs.short_sha }}

  docker-build-lungo:
    needs: subprojects-to-build
    if: ${{ needs.subprojects-to-build.outputs.build_lungo == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
