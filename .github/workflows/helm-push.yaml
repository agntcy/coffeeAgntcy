name: Helm Push Charts

on:
  push:
    tags: ["*"]
    branches:
      - main
    paths:
      - 'coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  pull_request:
    paths:
      - 'coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
      - '.github/workflows/helm-push.yaml'
      - '.github/workflows/helm-package-reusable.yaml'
      - '.github/actions/check-paths-have-changes/**'
  workflow_dispatch:
    inputs:
      push:
        description: 'Whether to push the charts to the registry.'
        required: false
        type: boolean
        default: false
      build_corto:
        description: 'Whether to build the corto chart.'
        required: false
        type: boolean
        default: true
      build_lungo:
        description: 'Whether to build the lungo chart.'
        required: false
        type: boolean
        default: true

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo
  HELM_SUBDIR: deployment/helm

jobs:
  subprojects-to-build:
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.choose-subprojects.outputs.push }}
      build_corto: ${{ steps.choose-subprojects.outputs.build_corto }}
      build_lungo: ${{ steps.choose-subprojects.outputs.build_lungo }}
    defaults:
      run:
        shell: bash
    env:
      WORKFLOW_FILES_LIST_JSON: '[".github/workflows/helm-push.yaml", ".github/workflows/helm-package-reusable.yaml", ".github/actions/check-paths-have-changes"]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log event info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"

      - name: Log dispatch inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "push=${{ inputs.push }}"
          echo "build_corto=${{ inputs.build_corto }}"
          echo "build_lungo=${{ inputs.build_lungo }}"

      - name: Prepare subproject paths JSON lists
        if: ${{ github.event_name == 'pull_request' }}
        id: prepare-path-lists
        run: |
          paths_json_corto=$(echo $WORKFLOW_FILES_LIST_JSON | jq -c -r --arg new_val "$CORTO_DIR/$HELM_SUBDIR" '[$new_val] + .')
          echo "paths_json_corto=$paths_json_corto" | tee -a $GITHUB_OUTPUT

          paths_json_lungo=$(echo $WORKFLOW_FILES_LIST_JSON | jq -c -r --arg new_val "$LUNGO_DIR/$HELM_SUBDIR" '[$new_val] + .')
          echo "paths_json_lungo=$paths_json_lungo" | tee -a $GITHUB_OUTPUT

      - name: Check paths have changes for Corto
        if: ${{ github.event_name == 'pull_request' }}
        id: check-paths-corto
        uses: ./.github/actions/check-paths-have-changes
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          paths_json_list: ${{ steps.prepare-path-lists.outputs.paths_json_corto }}

      - name: Check paths have changes for Lungo
        if: ${{ github.event_name == 'pull_request' }}
        id: check-paths-lungo
        uses: ./.github/actions/check-paths-have-changes
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          paths_json_list: ${{ steps.prepare-path-lists.outputs.paths_json_lungo }}

      - name: Determine build choices for subprojects
        id: choose-subprojects
        run: |
          build_corto=false
          build_lungo=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref_name }}" == "main" ]]; then
              push=true
            else
              push=false
            fi

            build_corto=true
            build_lungo=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            push=${{ inputs.push }}
            build_corto=${{ inputs.build_corto }}
            build_lungo=${{ inputs.build_lungo }}
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            push=false
            build_corto=${{ steps.check-paths-corto.outputs.changed }}
            build_lungo=${{ steps.check-paths-lungo.outputs.changed }}
          fi

          echo "push=$push" | tee -a $GITHUB_OUTPUT
          echo "build_corto=$build_corto" | tee -a $GITHUB_OUTPUT
          echo "build_lungo=$build_lungo" | tee -a $GITHUB_OUTPUT

  check-push-target-existence:
    needs: [subprojects-to-build]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      packages: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Helm integrity
        run: |
          push=${{ needs.subprojects-to-build.outputs.push }}
          build_corto=${{ needs.subprojects-to-build.outputs.build_corto }}
          build_lungo=${{ needs.subprojects-to-build.outputs.build_lungo }}

          existing_charts=()
          for project in corto lungo; do
            build=build_$project

            if [[ "${!build}" == "true" ]] && [[ "${push}" == "true" ]]; then
              if [[ "${project}" == "corto" ]]; then
                charts=(corto-ui corto-exchange corto-farm)
              elif [[ "${project}" == "lungo" ]]; then
                charts=(lungo-ui auction-supervisor agentic-workflows-api brazil-farm colombia-farm vietnam-farm weather-mcp-server payment-mcp-server logistics-shipper logistics-accountant logistics-farm logistics-supervisor logistics-helpdesk recruiter recruiter-supervisor)
              fi

              for chart in "${charts[@]}"; do
                chart_path="coffee_agntcy%2Fhelm%2F${chart}"

                directory="${chart}"
                if [[ "${chart}" == "lungo-ui" ]]; then
                  directory="ui"
                fi
                chart_directory="coffeeAGNTCY/coffee_agents/${project}/deployment/helm/${directory}"

                base="${{ github.event.before }}"
                head="${{ github.sha }}"
                if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                  base="${{ github.event.pull_request.base.sha }}"
                  head="${{ github.event.pull_request.head.sha }}"
                fi

                if git diff --name-only --exit-code "$base" "$head" -- "${chart_directory}/"; then
                  continue # Note: If the chart directory has no changes, skip checking for existing chart versions.
                fi

                chart_version=$(grep '^version:' ${chart_directory}/Chart.yaml | awk '{print $2}')

                version_id=$(gh api "/orgs/agntcy/packages/container/${chart_path}/versions" \
                  --jq '.[] | select(.metadata.container.tags[]? == "'${chart_version}'") | .id' \
                  | head -n1)

                if [[ -n "${version_id}" ]]; then
                  existing_charts+=("ghcr.io/agntcy/${chart_path}:${chart_version}")
                fi
              done
            fi
          done

          if [[ "${#existing_charts[@]}" -gt 0 ]]; then
            echo "Error: The following chart versions already exist:"
            for chart in "${existing_charts[@]}"; do
              echo "- $chart"
            done
            echo "Cancelling package and push. Change the version or use the 'Delete GHCR Package Version' workflow to delete the existing chart versions before retrying."

            exit 1
          fi

  helm-package-corto:
    needs: [subprojects-to-build, check-push-target-existence]
    if: ${{ needs.subprojects-to-build.outputs.build_corto == 'true' }}

    strategy:
      matrix:
        chart:
          - path: coffeeAGNTCY/coffee_agents/corto/deployment/helm/corto-ui
            package_name: corto-ui
          - path: coffeeAGNTCY/coffee_agents/corto/deployment/helm/exchange
            package_name: corto-exchange
          - path: coffeeAGNTCY/coffee_agents/corto/deployment/helm/farm
            package_name: corto-farm

    permissions: # permissions can only be maintained or reduced (not elevated) throughout a chain of workflows
      packages: write
      contents: read

    uses: ./.github/workflows/helm-package-reusable.yaml
    with:
      path: ${{ matrix.chart.path }}
      package_name: ${{ matrix.chart.package_name }}
      push: ${{ github.event_name == 'push' || ( github.event_name == 'workflow_dispatch' && inputs.push ) }}


  helm-package-lungo:
    needs: [subprojects-to-build, check-push-target-existence]
    if: ${{ needs.subprojects-to-build.outputs.build_lungo == 'true' }}

    strategy:
      matrix:
        chart:
          - name: lungo-ui
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/ui
            package_name: lungo-ui
          - name: auction-supervisor
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/auction-supervisor
            package_name: auction-supervisor
          - name: agentic-workflows-api
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/agentic-workflows-api
            package_name: agentic-workflows-api
          - name: brazil-farm
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/brazil-farm
            package_name: brazil-farm
          - name: colombia-farm
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/colombia-farm
            package_name: colombia-farm
          - name: vietnam-farm
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/vietnam-farm
            package_name: vietnam-farm
          - name: weather-mcp-server
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/weather-mcp-server
            package_name: weather-mcp-server
          - name: payment-mcp-server
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/payment-mcp-server
            package_name: payment-mcp-server
          - name: logistics-supervisor
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/logistics-supervisor
            package_name: logistics-supervisor
          - name: logistics-shipper
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/logistics-shipper
            package_name: logistics-shipper
          - name: logistics-accountant
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/logistics-accountant
            package_name: logistics-accountant
          - name: logistics-farm
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/logistics-farm
            package_name: logistics-farm
          - name: logistics-helpdesk
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/logistics-helpdesk
            package_name: logistics-helpdesk
          - name: recruiter
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/recruiter
            package_name: recruiter
          - name: recruiter-supervisor
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/recruiter-supervisor
            package_name: recruiter-supervisor

    permissions: # permissions can only be maintained or reduced (not elevated) throughout a chain of workflows
      packages: write
      contents: read

    uses: ./.github/workflows/helm-package-reusable.yaml
    with:
      path: ${{ matrix.chart.path }}
      package_name: ${{ matrix.chart.package_name }}
      push: ${{ github.event_name == 'push' || ( github.event_name == 'workflow_dispatch' && inputs.push )}}
