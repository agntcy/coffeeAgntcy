# Frontend CI: typecheck, ESLint, and Prettier for Lungo frontend when files there change.
# CD (deploy to dev/staging) would be a separate workflow. IDE: see TUTORIAL.md § IDE setup for CI (lint/format).
name: FE CI

on:
  pull_request:
    branches: [main]
    paths:
      - "coffeeAGNTCY/coffee_agents/lungo/frontend/**"
  push:
    branches: [main]
    paths:
      - "coffeeAGNTCY/coffee_agents/lungo/frontend/**"

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coffeeAGNTCY/coffee_agents/lungo/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: coffeeAGNTCY/coffee_agents/lungo/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check
