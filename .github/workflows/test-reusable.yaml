name: Python tests per project

on:
  workflow_call:
    inputs:
      project_dir:
        description: 'The directory of the project to test.'
        required: true
        type: string
      test_mode:
        description: 'fast | integration | llm-only'
        required: true
        type: string
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      fork_pr:
        description: 'True when the caller PR originates from a fork (skip LLM secrets and tests).'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project_dir }}
    env:
      WORKFLOW_API_KEY: TheAnswerIs42
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Apply uv overrides/constraints (if applicable)
        if: ${{ inputs.pip_overrides != '' || inputs.pip_constraints != '' }}
        uses: ./.github/actions/apply-uv-overrides
        with:
          project_dir: ${{ inputs.project_dir }}
          pip_overrides: ${{ inputs.pip_overrides }}
          pip_constraints: ${{ inputs.pip_constraints }}

      - name: Apply compose image overrides (if any)
        if: ${{ inputs.docker_overrides != '' }}
        uses: ./.github/actions/apply-container-overrides
        with:
          project_dir: ${{ inputs.project_dir }}/
          compose_file: docker-compose.yaml
          docker_overrides: ${{ inputs.docker_overrides }}

      - name: Resolve and install
        run: uv sync --extra dev

      - name: Run fast tests
        if: ${{ inputs.test_mode == 'fast' }}
        run: |
          set +e
          uv run pytest -m "not llm and not docker" --strict-markers -v --durations=0 --durations-min=1.0 -r ap
          code=$?
          set -e
          if [[ $code -eq 5 ]]; then
            echo "No fast-tier tests collected; treating as success."
            exit 0
          fi
          exit $code

      - name: Create CI env file
        if: ${{ inputs.test_mode == 'integration' || inputs.test_mode == 'llm-only' }}
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
        run: |
          if [[ "${{ inputs.fork_pr }}" == "true" ]]; then
            echo "fork_pr=true: skipping .env creation (no LLM secrets on fork PRs)."
            exit 0
          fi
          if [[ -z "$LLM_MODEL" ]]; then
            echo "::error::LLM secrets missing for LLM test run"
            exit 1
          fi
          {
            echo "LLM_MODEL=${LLM_MODEL}"
            echo "AZURE_API_KEY=${AZURE_API_KEY}"
            echo "AZURE_API_BASE=${AZURE_API_BASE}"
            echo "AZURE_API_VERSION=${AZURE_API_VERSION}"
            echo "WORKFLOW_API_KEY=${WORKFLOW_API_KEY}"
          } > .env

      - name: Run integration tests
        if: ${{ inputs.test_mode == 'integration' }}
        run: |
          set +e
          if [[ "${{ inputs.fork_pr }}" == "true" ]]; then
            marker_expr='docker and not llm'
          else
            marker_expr='llm or (docker and not llm)'
          fi
          echo "fork_pr=${{ inputs.fork_pr }} test_mode=${{ inputs.test_mode }} marker_expr=${marker_expr}"
          uv run pytest -m "$marker_expr" --strict-markers -v --durations=0 --durations-min=1.0 -r ap
          code=$?
          set -e
          if [[ $code -eq 5 ]]; then
            echo "No integration-tier tests collected; treating as success."
            exit 0
          fi
          exit $code

      - name: Refuse LLM-only on fork PRs
        if: ${{ inputs.test_mode == 'llm-only' && inputs.fork_pr == true }}
        run: |
          echo "::error::LLM-only tests cannot run on fork PRs (no secret injection)."
          exit 1

      - name: Run LLM-only tests
        if: ${{ inputs.test_mode == 'llm-only' && inputs.fork_pr != true }}
        run: |
          set +e
          uv run pytest -m "llm" --strict-markers -v --durations=0 --durations-min=1.0 -r ap
          code=$?
          set -e
          if [[ $code -eq 5 ]]; then
            echo "No LLM-tier tests collected; treating as success."
            exit 0
          fi
          exit $code
