opentelemetry-collector:
  image:
    repository: otel/opentelemetry-collector-k8s
  mode: deployment

clickhouse:
  auth:
    username: "admin"
    password: "admin"
  keeper:
    enabled: false
  shards: 1
  replicaCount: 1
  image:
    repository: bitnamilegacy/clickhouse
    tag: 25.6.4-debian-12-r0
    pullPolicy: IfNotPresent

nats:
  readinessProbe:
    httpGet: { path: /healthz, port: 8222 }
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  livenessProbe:
    httpGet: { path: /healthz, port: 8222 }
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 6

corto-exchange:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"
    slimSharedSecret: "slim-shared-secret-REPLACE_WITH_RANDOM_32PLUS_CHARS"

corto-ui:
  environment: local
  configs:
    env:
      data:
        VITE_EXCHANGE_APP_API_URL: http://localhost:30080
