# Shared schemas for the Agentic Workflows API.
# Event / graph types reference canonical JSON Schema alongside Pydantic in schema/types/event.py.

components:
  schemas:
    Event:
      $ref: ../../jsonschemas/event_v1.json
    Workflow:
      $ref: ../../jsonschemas/event_v1.json#/$defs/workflow
    WorkflowInstance:
      $ref: ../../jsonschemas/event_v1.json#/$defs/workflow_instance
    Topology:
      $ref: ../../jsonschemas/event_v1.json#/$defs/topology
    PartialTopology:
      $ref: ../../jsonschemas/event_v1.json#/$defs/partial_topology
    InstanceId:
      $ref: ../../jsonschemas/event_v1.json#/$defs/instance_id

    WorkflowInstancePathId:
      type: string
      format: uuid
      description: >
        Bare workflow instance UUID used only in URL path segments for instance-scoped routes.
        Canonical instance identifiers in JSON payloads remain InstanceId URIs (instance://... per event_v1).

    Pattern:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1

    PatternListResponse:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Pattern"

    UseCase:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1

    UseCaseListResponse:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UseCase"

    WorkflowSummary:
      type: object
      required:
        - name
        - pattern
        - use_case
        - scenario
        - supports_sse
        - supports_streaming
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
        pattern:
          type: string
          minLength: 1
        use_case:
          type: string
          minLength: 1
        scenario:
          type: string
          minLength: 1
        supports_sse:
          type: boolean
        supports_streaming:
          type: boolean
        chat_api_target:
          type: string
          nullable: true
          enum: [exchange, logistics, discovery]
          description: >-
            Which Lungo chat API base to use; null when the workflow is not
            runnable in the UI.

    WorkflowSummaryMapResponse:
      type: object
      description: Workflows keyed by workflow name (map key equals WorkflowSummary.name).
      propertyNames:
        type: string
        minLength: 1
      additionalProperties:
        $ref: "#/components/schemas/WorkflowSummary"

    WorkflowDocumentationSection:
      type: object
      required: [anchor, heading, body_markdown]
      additionalProperties: false
      properties:
        anchor:
          type: string
          minLength: 1
          description: Stable id derived from the section heading (for anchors / TOC).
        heading:
          type: string
          minLength: 1
          description: Markdown ## heading text (without hashes).
        body_markdown:
          type: string
          description: Markdown body for this section.

    WorkflowDocumentationResponse:
      type: object
      required: [slug, workflow_name, sections, full_markdown]
      additionalProperties: false
      properties:
        slug:
          type: string
          minLength: 1
          description: Basename used for docs/workflows/{slug}.md.
        workflow_name:
          type: string
          minLength: 1
          description: Catalog workflow name (matches Workflow.name).
        title:
          type: string
          nullable: true
          description: Document H1 title when present.
        sections:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDocumentationSection"
        full_markdown:
          type: string
          description: Complete markdown file contents.

    InstantiateWorkflowResponse:
      type: object
      required: [workflow_instance_id]
      additionalProperties: false
      properties:
        workflow_instance_id:
          $ref: "#/components/schemas/InstanceId"

    WorkflowInstanceMapResponse:
      type: object
      description: Workflow instances keyed by workflow instance id (InstanceId URI).
      propertyNames:
        $ref: "#/components/schemas/InstanceId"
      additionalProperties:
        $ref: "#/components/schemas/WorkflowInstance"
