# Agentic pattern definitions — loaded by PatternRegistry.from_file()
#
# Each pattern describes the protocol, transport, and (optionally)
# topological structure for an agentic communication style.
# Agent lists are intentionally empty — they will be populated
# when UI integration is added. For now, patterns serve as
# transport config lookups for runtime code.

patterns:
  - id: slim-publish-subscribe
    enabled: true
    name: Publish-Subscribe
    description: Publish subscribe over SLIM for broadcasting messages to multiple agents.
    protocol: a2a
    transport: slim
    communication_channel: farm_broadcast
    agents: []

  - id: nats-publish-subscribe
    enabled: false
    name: Publish-Subscribe
    description: Publish subscribe over NATS for broadcasting messages to multiple agents.
    protocol: a2a
    transport: nats
    agents: []

  - id: slim-group-communication
    enabled: true
    name: Secure Group Communication
    description: Multi-agent group chat over SLIM with a supervisor moderator.
    protocol: a2a
    transport: slim
    agents: []

  - id: slim-mcp-client-server
    enabled: true
    name: MCP Client-Server
    description: MCP tool invocation over SLIM message bridge for server-agent communication.
    protocol: mcp
    transport: slim
    agents: []

  - id: nats-mcp-client-server
    enabled: false
    name: MCP Client-Server
    description: MCP tool invocation over NATS for server-agent communication.
    protocol: mcp
    transport: nats
    agents: []
