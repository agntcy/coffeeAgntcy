# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

appName: agentic-workflows-api
appVersion: v1
replicaCount: 1

environment:

image:
  repository: ghcr.io/agntcy/coffee-agntcy/agentic-workflows-api
  tag: latest
  pullPolicy: Always
  pullSecret:

service:
  port: 9105

config:
  corsAllowedOrigins: ""
  llmModel: ""
  # Set for local/dev chart installs only; production should use an external Secret.
  workflowApiKey: "TheAnswerIs42"

workflowApiKeySecret:
  name: agentic-workflows-api-api-key-secret
  key: WORKFLOW_API_KEY

# You can use your own ingress stack of operators and letsencrypt mechanism
ingress:
  enabled: false # If set to true, configure the values below for your ingress setup
  name: ""
  className: ""
  host: ""
  serviceName: ""
  servicePort: ""
  tlsSecret: ""
  annotations: {}

extraIngress:
  enabled: false # If set to true, configure the values below for your additional ingress setup
  name: ""
  className: ""
  host: ""
  serviceName: ""
  servicePort: ""
  tlsSecret: ""
  path: ""
  pathType: ""
  annotations: {}

probes:
  readinessProbeEnabled: true
  livenessProbeEnabled: true
  port: 9105
  endpoint: /health
  initialDelaySeconds: 5
  periodSeconds: 15

resources:
  enabled: false
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

serviceaccount:
  annotations:
    eks.amazonaws.com/role-arn: REPLACE_WITH_ROLE_ARN
