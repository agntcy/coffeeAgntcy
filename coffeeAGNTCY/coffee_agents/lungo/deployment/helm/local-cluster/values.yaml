opentelemetry-collector:
  image:
    repository: otel/opentelemetry-collector-k8s
  mode: deployment

clickhouse:
  auth:
    username: "admin"
    password: "admin"
  keeper:
    enabled: false
  shards: 1
  replicaCount: 1
  image:
    repository: bitnamilegacy/clickhouse
    tag: 25.6.4-debian-12-r0
    pullPolicy: IfNotPresent

nats:
  readinessProbe:
    httpGet: { path: /healthz, port: 8222 }
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  livenessProbe:
    httpGet: { path: /healthz, port: 8222 }
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 6

weather-mcp-server:
  transportServerEndpoint: "nats://lungo-local-cluster-nats:4222"
  defaultMessageTransport: "NATS"
  slimServer: "lungo-local-cluster-slim:46357"
  natsServer: "lungo-local-cluster-nats:4222"
  # Set via CI/helmfile or leave empty if using image default from config.config for dev only.
  slimSharedSecret: "dummy_password" # SLIM_SHARED_SECRET: set here to create {app}-transport-secret (overrides ES when both are used). Leave empty to take SLIM_SHARED_SECRET only from externalSecrets / vault
  otlpHttpEndpoint: "http://lungo-local-cluster-opentelemetry-collector:4318"

agentic-workflows-api:
  environment: local
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

auction-supervisor:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

logistics-accountant:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

logistics-farm:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

logistics-helpdesk:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

logistics-shipper:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

logistics-supervisor:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

recruiter-supervisor:
  config:
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000"

lungo-ui:
  environment: local
  configs:
    env:
      data:
        VITE_AGENTIC_WORKFLOWS_API_KEY: TheAnswerIs42 # Must match WORKFLOW_API_KEY on the Agentic Workflows API.
        VITE_AGENTIC_WORKFLOWS_API_URL: http://localhost:30084
        VITE_AGENTIC_WORKFLOWS_DOCS_GITHUB_BRANCH: main
        # VITE_DIRECTORY_SERVER_URL: http://127.0.0.1:8888
        VITE_DIRECTORY_VERSION: v1.0.0
        VITE_DISCOVERY_APP_API_URL: http://localhost:30082
        VITE_EXCHANGE_APP_API_URL: http://localhost:30080
        # VITE_GRAFANA_URL: http://127.0.0.1:3001
        VITE_LOGISTICS_APP_API_URL: http://localhost:30081

# Populated by helmfile / config-overrides.yaml.gotmpl for local dev; defaults avoid nil when templating alone.
localExternalSecret:
  azureApiKey: ""
  slimSharedSecret: "dummy_password"
